<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüksek Zeka Konseyi (COHI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1 class="glow-text">Yüksek Zeka Konseyi</h1>
        <p>Fikirlerinizi tarihin en büyük zihinleriyle tartışın.</p>
    </header>

    <main class="dashboard">

        <!-- INPUT PANEL -->
        <section class="input-panel"> 
            <div class="triads-container">
    <p>Hızlı Grup Seçimi (Triads):</p>
    <div class="triad-buttons">
        <button type="button" class="triad-btn" onclick="selectTriad(['suntzu', 'machiavelli', 'aurelius'])">Strateji & Güç</button>
        <button type="button" class="triad-btn" onclick="selectTriad(['socrates', 'feynman', 'kahneman'])">Mantık & Analiz</button>
        <button type="button" class="triad-btn" onclick="selectTriad(['torvalds', 'feynman', 'machiavelli'])">Uygulama & Pragmatizm</button>
        <button type="button" class="triad-btn" onclick="selectTriad(['aurelius', 'socrates', 'suntzu'])">Etik & Disiplin</button>
    </div>
</div>
            <div class="control-group">
    <label>Konsey Üyelerini Seçin:</label>
    <div id="member-checkboxes" class="checkbox-grid">
    <label class="cb-container"><input type="checkbox" id="socrates" name="council-member" value="socrates"><span class="checkmark"></span> Sokrates (Sorgulama)</label>
    <label class="cb-container"><input type="checkbox" id="aurelius" name="council-member" value="aurelius"><span class="checkmark"></span> Marcus Aurelius (Stoacılık)</label>
    <label class="cb-container"><input type="checkbox" id="aristotle" name="council-member" value="aristotle"><span class="checkmark"></span> Aristo (Mantık/Sınıflandırma)</label>
    <label class="cb-container"><input type="checkbox" id="laotzu" name="council-member" value="laotzu"><span class="checkmark"></span> Lao Tzu (Doğal Akış)</label>
    
    <label class="cb-container"><input type="checkbox" id="suntzu" name="council-member" value="suntzu"><span class="checkmark"></span> Sun Tzu (Savaş Sanatı)</label>
    <label class="cb-container"><input type="checkbox" id="machiavelli" name="council-member" value="machiavelli"><span class="checkmark"></span> Machiavelli (Güç Dinamikleri)</label>
    <label class="cb-container"><input type="checkbox" id="musashi" name="council-member" value="musashi"><span class="checkmark"></span> Miyamoto Musashi (Odak & Zamanlama)</label>
    <label class="cb-container"><input type="checkbox" id="munger" name="council-member" value="munger"><span class="checkmark"></span> Charlie Munger (Zihinsel Modeller)</label>

    <label class="cb-container"><input type="checkbox" id="feynman" name="council-member" value="feynman"><span class="checkmark"></span> Richard Feynman (İlk Prensipler)</label>
    <label class="cb-container"><input type="checkbox" id="ada" name="council-member" value="ada"><span class="checkmark"></span> Ada Lovelace (Algoritmik Düşünce)</label>
    <label class="cb-container"><input type="checkbox" id="torvalds" name="council-member" value="torvalds"><span class="checkmark"></span> Linus Torvalds (Mühendislik Gerçekliği)</label>
    <label class="cb-container"><input type="checkbox" id="karpathy" name="council-member" value="karpathy"><span class="checkmark"></span> Andrej Karpathy (Uygulamalı AI)</label>
    <label class="cb-container"><input type="checkbox" id="sutskever" name="council-member" value="sutskever"><span class="checkmark"></span> Ilya Sutskever (AI Sınırları)</label>

    <label class="cb-container"><input type="checkbox" id="kahneman" name="council-member" value="kahneman"><span class="checkmark"></span> Daniel Kahneman (Karar Bilimi)</label>
    <label class="cb-container"><input type="checkbox" id="taleb" name="council-member" value="taleb"><span class="checkmark"></span> Nassim Taleb (Risk & Belirsizlik)</label>
    <label class="cb-container"><input type="checkbox" id="meadows" name="council-member" value="meadows"><span class="checkmark"></span> Donella Meadows (Sistem Düşüncesi)</label>
    
    <label class="cb-container"><input type="checkbox" id="rams" name="council-member" value="rams"><span class="checkmark"></span> Dieter Rams (Minimalist Tasarım)</label>
    <label class="cb-container"><input type="checkbox" id="watts" name="council-member" value="watts"><span class="checkmark"></span> Alan Watts (Çerçeveleme)</label>
</div>
</div>

            <div class="control-group">
                <label for="user-input">Tartışılacak Fikir:</label>
                <textarea 
                    id="user-input" 
                    rows="5"
                    placeholder="Startup için hangi iş modelini seçmeliyim? | Post-truth nedir? | İnsan ne akdar rasyoneldir?"
                ></textarea>
            </div>

            <button id="submit-btn" onclick="askCouncil()">
                Konseye Sun ➔
            </button>

        </section>

        <!-- OUTPUT PANEL -->
        <section class="output-panel">

            <h2>Konseyin Analizi</h2>

            <!-- LOADING -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Zihinler tartışıyor...</p>
            </div>

            <!-- RESPONSES -->
            <div id="response-box" class="response-box">
                <p class="placeholder-text">
                    Henüz bir fikir sunulmadı.
                </p>
            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
