<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüksek Zeka Konseyi (COHI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1 class="glow-text">Yüksek Zeka Konseyi</h1>
        <p>Fikirlerinizi tarihin en büyük zihinleriyle tartışın.</p>
    </header>

    <main class="dashboard">

        <!-- INPUT PANEL -->
        <section class="input-panel">

            <!-- MEMBER SELECTION -->
            <div class="control-group">
                <label>Konsey Üyeleri:</label>

                <div class="members">
                    <label>
                        <input type="checkbox" value="socrates" checked>
                        Sokrates
                    </label>

                    <label>
                        <input type="checkbox" value="feynman" checked>
                        Feynman
                    </label>

                    <label>
                        <input type="checkbox" value="machiavelli" checked>
                        Machiavelli
                    </label>
                </div>
            </div>

            <!-- USER INPUT -->
            <div class="control-group">
                <label for="user-input">Tartışılacak Fikir:</label>
                <textarea 
                    id="user-input" 
                    rows="5"
                    placeholder="Örn: Startup için hangi iş modelini seçmeliyim?"
                ></textarea>
            </div>

            <!-- BUTTON -->
            <button id="submit-btn" onclick="askCouncil()">
                Konseye Sun ➔
            </button>

        </section>

        <!-- OUTPUT PANEL -->
        <section class="output-panel">

            <h2>Konseyin Analizi</h2>

            <!-- LOADING -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Zihinler tartışıyor...</p>
            </div>

            <!-- RESPONSES -->
            <div id="response-box" class="response-box">
                <p class="placeholder-text">
                    Henüz bir fikir sunulmadı.
                </p>
            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
