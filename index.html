<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüksek Zeka Konseyi (COHI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1 class="glow-text">Yüksek Zeka Konseyi</h1>
        <p>Fikirlerinizi tarihin en büyük zihinleriyle tartışın.</p>
    </header>

    <main class="dashboard">

        <!-- INPUT PANEL -->
        <section class="input-panel" id="member-select" multiple>

            <!-- MEMBER SELECTION -->
            <div class="control-group">
                <label>Konsey Üyeleri:</label>

                   <option value="socrates">Sokrates (Varsayımları Yıkar)</option>
                    <option value="feynman">Richard Feynman (Basitleştirir)</option>
                    <option value="machiavelli">Machiavelli (Strateji ve Güç)</option>
                    <option value="torvalds">Linus Torvalds (Pragmatik ve Pratik)</option>
                    <option value="aurelius">Marcus Aurelius (Stoacı ve Ahlaki)</option>
                    <option value="suntzu">Sun Tzu (Rekabet ve Strateji)</option>
                    <option value="kahneman">Daniel Kahneman (Önyargı Dedektifi)</option>
            </div>

            <!-- USER INPUT -->
            <div class="control-group">
                <label for="user-input">Tartışılacak Fikir:</label>
                <textarea 
                    id="user-input" 
                    rows="5"
                    placeholder="Örn: Startup için hangi iş modelini seçmeliyim?"
                ></textarea>
            </div>

            <!-- BUTTON -->
            <button id="submit-btn" onclick="askCouncil()">
                Konseye Sun ➔
            </button>

        </section>

        <!-- OUTPUT PANEL -->
        <section class="output-panel">

            <h2>Konseyin Analizi</h2>

            <!-- LOADING -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Zihinler tartışıyor...</p>
            </div>

            <!-- RESPONSES -->
            <div id="response-box" class="response-box">
                <p class="placeholder-text">
                    Henüz bir fikir sunulmadı.
                </p>
            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
