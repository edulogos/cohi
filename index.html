<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yüksek Zeka Konseyi (COHI)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <header>
        <h1 class="glow-text">Yüksek Zeka Konseyi</h1>
        <p>Fikirlerinizi tarihin en büyük zihinleriyle tartışın.</p>
    </header>

    <main class="dashboard">

        <!-- INPUT PANEL -->
        <section class="input-panel"> 
            <div class="triads-container">
    <p>Hızlı Grup Seçimi (Triads):</p>
    <div class="triad-buttons">
        <button type="button" class="triad-btn" onclick="selectTriad(['suntzu', 'machiavelli', 'aurelius'])">Strateji & Güç</button>
        <button type="button" class="triad-btn" onclick="selectTriad(['socrates', 'feynman', 'kahneman'])">Mantık & Analiz</button>
        <button type="button" class="triad-btn" onclick="selectTriad(['torvalds', 'feynman', 'machiavelli'])">Uygulama & Pragmatizm</button>
        <button type="button" class="triad-btn" onclick="selectTriad(['aurelius', 'socrates', 'suntzu'])">Etik & Disiplin</button>
    </div>
</div>
            <div class="control-group">
    <label>Konsey Üyelerini Seçin:</label>
    <div id="member-checkboxes" class="checkbox-grid">
    <label class="cb-container">
        <input type="checkbox" id="socrates" name="council-member" value="socrates">
        <span class="checkmark"></span> Sokrates (Varsayımları Yıkar)
    </label>
    <label class="cb-container">
        <input type="checkbox" id="feynman" name="council-member" value="feynman">
        <span class="checkmark"></span> Richard Feynman (Basitleştirir)
    </label>
    <label class="cb-container">
        <input type="checkbox" id="machiavelli" name="council-member" value="machiavelli">
        <span class="checkmark"></span> Machiavelli (Strateji ve Güç)
    </label>
    <label class="cb-container">
        <input type="checkbox" id="torvalds" name="council-member" value="torvalds">
        <span class="checkmark"></span> Linus Torvalds (Pragmatik)
    </label>
    <label class="cb-container">
        <input type="checkbox" id="aurelius" name="council-member" value="aurelius">
        <span class="checkmark"></span> Marcus Aurelius (Stoacı)
    </label>
    <label class="cb-container">
        <input type="checkbox" id="suntzu" name="council-member" value="suntzu">
        <span class="checkmark"></span> Sun Tzu (Strateji)
    </label>
    <label class="cb-container">
        <input type="checkbox" id="kahneman" name="council-member" value="kahneman">
        <span class="checkmark"></span> Daniel Kahneman (Psikoloji)
    </label>
</div>
</div>

            <div class="control-group">
                <label for="user-input">Tartışılacak Fikir:</label>
                <textarea 
                    id="user-input" 
                    rows="5"
                    placeholder="Örn: Startup için hangi iş modelini seçmeliyim?"
                ></textarea>
            </div>

            <button id="submit-btn" onclick="askCouncil()">
                Konseye Sun ➔
            </button>

        </section>

        <!-- OUTPUT PANEL -->
        <section class="output-panel">

            <h2>Konseyin Analizi</h2>

            <!-- LOADING -->
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Zihinler tartışıyor...</p>
            </div>

            <!-- RESPONSES -->
            <div id="response-box" class="response-box">
                <p class="placeholder-text">
                    Henüz bir fikir sunulmadı.
                </p>
            </div>

        </section>

    </main>

</div>

<script src="app.js"></script>

</body>
</html>
